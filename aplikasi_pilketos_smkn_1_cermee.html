<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PILKETOS SMK NEGERI 1 CERMEE</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- SheetJS (xlsx) for Excel Import -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        /* Custom print styling */
        @media print {
            body * {
                visibility: hidden;
            }
            #print-area, #print-area *, #print-cards, #print-cards * {
                visibility: visible;
            }
            #print-area {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                display: block !important;
            }
            #print-cards {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                display: grid !important;
            }
            .no-print {
                display: none !important;
            }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <div id="root"></div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script type="text/babel">
        // Konfigurasi default Firebase & AppID global
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'pilketos-smkn1cermee-db';
        
        let firebaseConfig;
        try {
            firebaseConfig = JSON.parse(__firebase_config);
        } catch (e) {
            // Fallback Firebase Config (jika tidak disediakan oleh environment)
            firebaseConfig = {
                apiKey: "",
                authDomain: "pilketos-smkn1cermee.firebaseapp.com",
                projectId: "pilketos-smkn1cermee",
                storageBucket: "pilketos-smkn1cermee.appspot.com",
                messagingSenderId: "1234567890",
                appId: "1:1234:web:abcd"
            };
        }

        // Initialize Firebase
        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Default Data untuk inisialisasi jika database masih kosong
        const DEFAULT_SETTINGS = {
            tahunPelajaran: "2026/2027",
            schoolLogo: "https://images.unsplash.com/photo-1546410531-bb4caa6b424d?w=120&auto=format&fit=crop&q=60&ixlib=rb-4.0.3",
            adminProfile: "https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=120&auto=format&fit=crop&q=60&ixlib=rb-4.0.3",
            adminPassword: "pilketos"
        };

        const DEFAULT_CANDIDATES = [
            {
                id: "paslon-1",
                nomor: "01",
                namaKetua: "Andi Saputra",
                namaWakil: "Siti Rahma",
                visi: "Mewujudkan OSIS SMK Negeri 1 Cermee yang aktif, kreatif, inovatif, dan berakhlak mulia serta adaptif terhadap perkembangan teknologi modern.",
                misi: "1. Mengoptimalkan program kerja ekstrakurikuler berbasis teknologi.\n2. Menyelenggarakan forum diskusi kepemimpinan siswa.\n3. Mempererat kolaborasi kreatif antar kelas melalui pekan seni dan olahraga.",
                foto: "https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=400&auto=format&fit=crop&q=80"
            },
            {
                id: "paslon-2",
                nomor: "02",
                namaKetua: "Budi Wijaya",
                namaWakil: "Rini Astuti",
                visi: "Membangun lingkungan sekolah yang harmonis, inklusif, berprestasi tinggi di bidang akademik maupun non-akademik.",
                misi: "1. Menyediakan ruang aspirasi terbuka bagi seluruh siswa.\n2. Mengadakan bimbingan belajar teman sebaya menjelang ujian.\n3. Menyelenggarakan bakti sosial dan kampanye ramah lingkungan di sekolah.",
                foto: "https://images.unsplash.com/photo-1573497019940-1c28c88b4f3e?w=400&auto=format&fit=crop&q=80"
            }
        ];

        function App() {
            const [user, setUser] = React.useState(null);
            const [role, setRole] = React.useState(null); // 'admin' atau 'pemilih'
            const [currentVoter, setCurrentVoter] = React.useState(null);
            
            // Loading State
            const [loading, setLoading] = React.useState(true);
            const [actionLoading, setActionLoading] = React.useState(false);
            
            // App Data States (Synced with Firestore)
            const [settings, setSettings] = React.useState(DEFAULT_SETTINGS);
            const [candidates, setCandidates] = React.useState([]);
            const [voters, setVoters] = React.useState([]);
            const [votes, setVotes] = React.useState([]);

            // UI States
            const [activeTab, setActiveTab] = React.useState('dashboard'); // dashboard, pemilih-data, paslon-data, pengaturan
            const [editingPaslon, setEditingPaslon] = React.useState(null);
            const [showAddPaslonModal, setShowAddPaslonModal] = React.useState(false);
            const [newPaslon, setNewPaslon] = React.useState({ nomor: '', namaKetua: '', namaWakil: '', foto: '', visi: '', misi: '' });
            const [searchQuery, setSearchQuery] = React.useState('');
            const [filterVoted, setFilterVoted] = React.useState('all'); // all, voted, not_voted
            
            // Temporary Settings States for Edit
            const [tempTahunPelajaran, setTempTahunPelajaran] = React.useState('');
            const [tempSchoolLogo, setTempSchoolLogo] = React.useState('');
            const [tempAdminPassword, setTempAdminPassword] = React.useState('');

            // Login Form States
            const [loginUsername, setLoginUsername] = React.useState('');
            const [loginPassword, setLoginPassword] = React.useState('');
            
            // Notification Custom Modal
            const [alertModal, setAlertModal] = React.useState({ show: false, title: '', message: '', type: 'info' });

            // Inisialisasi Firebase Auth & sinkronisasi data real-time
            React.useEffect(() => {
                const initApp = async () => {
                    setLoading(true);
                    try {
                        // Sign in secara anonim untuk otentikasi aman ke Firestore
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (error) {
                        console.error("Firebase Auth Error:", error);
                    }
                    setLoading(false);
                };

                initApp();

                // Listener untuk mendeteksi status user Firebase
                const unsubscribeAuth = auth.onAuthStateChanged((usr) => {
                    if (usr) {
                        setUser(usr);
                    } else {
                        setUser(null);
                    }
                });

                return () => unsubscribeAuth();
            }, []);

            // Listener sinkronisasi Firestore (Hanya jalan jika user ter-otentikasi)
            React.useEffect(() => {
                if (!user) return;

                // Path Pengaturan (Public)
                const settingsDocRef = db.doc(`artifacts/${appId}/public/data/settings/config`);
                const unsubscribeSettings = settingsDocRef.onSnapshot((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        setSettings(data);
                        setTempTahunPelajaran(data.tahunPelajaran);
                        setTempSchoolLogo(data.schoolLogo);
                        setTempAdminPassword(data.adminPassword);
                    } else {
                        // Tulis default settings jika belum ada
                        settingsDocRef.set(DEFAULT_SETTINGS);
                    }
                }, (error) => console.error("Error settings snapshot:", error));

                // Path Kandidat (Public)
                const candidatesCollRef = db.collection(`artifacts/${appId}/public/data/candidates`);
                const unsubscribeCandidates = candidatesCollRef.onSnapshot((snapshot) => {
                    const loadedCandidates = [];
                    snapshot.forEach((doc) => {
                        loadedCandidates.push({ id: doc.id, ...doc.data() });
                    });
                    
                    if (loadedCandidates.length === 0) {
                        // Tambahkan kandidat default jika kosong
                        DEFAULT_CANDIDATES.forEach(c => {
                            candidatesCollRef.doc(c.id).set(c);
                        });
                    } else {
                        // Urutkan berdasarkan nomor paslon
                        loadedCandidates.sort((a, b) => a.nomor.localeCompare(b.nomor));
                        setCandidates(loadedCandidates);
                    }
                }, (error) => console.error("Error candidates snapshot:", error));

                // Path Pemilih (Public)
                const votersCollRef = db.collection(`artifacts/${appId}/public/data/voters`);
                const unsubscribeVoters = votersCollRef.onSnapshot((snapshot) => {
                    const loadedVoters = [];
                    snapshot.forEach((doc) => {
                        loadedVoters.push({ id: doc.id, ...doc.data() });
                    });
                    // Urutkan pemilih berdasarkan username/no urut
                    loadedVoters.sort((a, b) => a.username.localeCompare(b.username));
                    setVoters(loadedVoters);
                }, (error) => console.error("Error voters snapshot:", error));

                // Path Suara Masuk (Public)
                const votesCollRef = db.collection(`artifacts/${appId}/public/data/votes`);
                const unsubscribeVotes = votesCollRef.onSnapshot((snapshot) => {
                    const loadedVotes = [];
                    snapshot.forEach((doc) => {
                        loadedVotes.push({ id: doc.id, ...doc.data() });
                    });
                    setVotes(loadedVotes);
                }, (error) => console.error("Error votes snapshot:", error));

                return () => {
                    unsubscribeSettings();
                    unsubscribeCandidates();
                    unsubscribeVoters();
                    unsubscribeVotes();
                };
            }, [user]);

            // Effect untuk merender diagram hasil pemilu setiap kali ada perubahan suara masuk atau kandidat
            React.useEffect(() => {
                if (role === 'admin' && activeTab === 'dashboard' && candidates.length > 0) {
                    const ctx = document.getElementById('votingChart');
                    if (ctx) {
                        // Hancurkan chart sebelumnya jika ada
                        const existingChart = Chart.getChart(ctx);
                        if (existingChart) existingChart.destroy();

                        const labels = candidates.map(c => `Paslon ${c.nomor} - ${c.namaKetua}`);
                        const dataValues = candidates.map(c => {
                            return votes.filter(v => v.candidateId === c.id).length;
                        });

                        new Chart(ctx, {
                            type: 'bar',
                            data: {
                                labels: labels,
                                datasets: [{
                                    label: 'Jumlah Perolehan Suara',
                                    data: dataValues,
                                    backgroundColor: [
                                        'rgba(59, 130, 246, 0.7)',
                                        'rgba(16, 185, 129, 0.7)',
                                        'rgba(245, 158, 11, 0.7)',
                                        'rgba(239, 68, 68, 0.7)',
                                        'rgba(139, 92, 246, 0.7)'
                                    ],
                                    borderColor: [
                                        'rgb(59, 130, 246)',
                                        'rgb(16, 185, 129)',
                                        'rgb(245, 158, 11)',
                                        'rgb(239, 68, 68)',
                                        'rgb(139, 92, 246)'
                                    ],
                                    borderWidth: 2,
                                    borderRadius: 12
                                }]
                            },
                            options: {
                                responsive: true,
                                plugins: {
                                    legend: {
                                        display: false
                                    }
                                },
                                scales: {
                                    y: {
                                        beginAtZero: true,
                                        ticks: {
                                            stepSize: 1
                                        }
                                    }
                                }
                            }
                        });
                    }
                }
            }, [role, activeTab, candidates, votes]);

            // Tampilkan Notifikasi Custom Modal
            const showAlert = (title, message, type = 'info') => {
                setAlertModal({ show: true, title, message, type });
            };

            const closeAlert = () => {
                setAlertModal({ show: false, title: '', message: '', type: 'info' });
            };

            // Sistem Login
            const handleLogin = (e) => {
                e.preventDefault();
                if (!loginUsername || !loginPassword) {
                    showAlert("Input Kosong", "Silakan masukkan username dan password terlebih dahulu.", "warning");
                    return;
                }

                // Cek Login Admin
                if (loginUsername.trim().toLowerCase() === 'admin') {
                    if (loginPassword === settings.adminPassword) {
                        setRole('admin');
                        setActiveTab('dashboard');
                        showAlert("Login Sukses", "Selamat datang Admin PILKETOS SMK Negeri 1 Cermee!", "success");
                        setLoginUsername('');
                        setLoginPassword('');
                    } else {
                        showAlert("Login Gagal", "Password admin salah. Silakan coba lagi.", "danger");
                    }
                    return;
                }

                // Cek Login Pemilih
                const matchedVoter = voters.find(v => v.username === loginUsername.trim() && v.password === loginPassword.trim());
                if (matchedVoter) {
                    if (matchedVoter.hasVoted) {
                        showAlert("Sudah Memilih", `Akun ${matchedVoter.username} (${matchedVoter.nama}) sudah menggunakan hak suaranya dan tidak dapat login kembali.`, "warning");
                    } else {
                        setRole('pemilih');
                        setCurrentVoter(matchedVoter);
                        showAlert("Login Berhasil", `Selamat datang, ${matchedVoter.nama}. Silakan tentukan pilihan terbaik Anda!`, "success");
                        setLoginUsername('');
                        setLoginPassword('');
                    }
                } else {
                    showAlert("Akun Tidak Ditemukan", "Kombinasi Nomor Urut (4 angka) dan Password tidak terdaftar.", "danger");
                }
            };

            // Sistem Logout
            const handleLogout = () => {
                setRole(null);
                setCurrentVoter(null);
                showAlert("Sesi Berakhir", "Anda telah berhasil logout dengan aman.", "info");
            };

            // Tambah Pasangan Calon Baru
            const handleAddPaslon = async (e) => {
                e.preventDefault();
                if (!newPaslon.nomor || !newPaslon.namaKetua || !newPaslon.namaWakil || !newPaslon.foto || !newPaslon.visi || !newPaslon.misi) {
                    showAlert("Data Kurang", "Mohon isi semua kolom data pasangan calon.", "warning");
                    return;
                }

                if (candidates.some(c => c.nomor === newPaslon.nomor)) {
                    showAlert("Nomor Duplikat", "Nomor urut paslon sudah digunakan oleh kandidat lain.", "warning");
                    return;
                }

                setActionLoading(true);
                try {
                    const id = `paslon-${Date.now()}`;
                    await db.collection(`artifacts/${appId}/public/data/candidates`).doc(id).set({
                        id,
                        nomor: newPaslon.nomor,
                        namaKetua: newPaslon.namaKetua,
                        namaWakil: newPaslon.namaWakil,
                        foto: newPaslon.foto,
                        visi: newPaslon.visi,
                        misi: newPaslon.misi
                    });
                    setShowAddPaslonModal(false);
                    setNewPaslon({ nomor: '', namaKetua: '', namaWakil: '', foto: '', visi: '', misi: '' });
                    showAlert("Sukses", "Pasangan calon baru berhasil didaftarkan!", "success");
                } catch (err) {
                    showAlert("Gagal", "Terjadi kesalahan saat menyimpan data ke database.", "danger");
                } finally {
                    setActionLoading(false);
                }
            };

            // Hapus Pasangan Calon
            const handleDeletePaslon = async (id) => {
                if (!confirm("Apakah Anda yakin ingin menghapus pasangan calon ini?")) return;
                setActionLoading(true);
                try {
                    await db.collection(`artifacts/${appId}/public/data/candidates`).doc(id).delete();
                    showAlert("Terhapus", "Data pasangan calon telah dihapus secara permanen.", "info");
                } catch (err) {
                    showAlert("Gagal", "Tidak dapat menghapus data kandidat.", "danger");
                } finally {
                    setActionLoading(false);
                }
            };

            // Update Pasangan Calon
            const handleUpdatePaslon = async (e) => {
                e.preventDefault();
                setActionLoading(true);
                try {
                    await db.collection(`artifacts/${appId}/public/data/candidates`).doc(editingPaslon.id).set(editingPaslon);
                    setEditingPaslon(null);
                    showAlert("Diperbarui", "Data pasangan calon berhasil diperbarui secara otomatis.", "success");
                } catch (err) {
                    showAlert("Gagal", "Tidak dapat memperbarui data pasangan calon.", "danger");
                } finally {
                    setActionLoading(false);
                }
            };

            // Proses Voting oleh Pemilih
            const handleVoteSubmit = async (candidateId, paslonName) => {
                if (!currentVoter) return;
                
                const konfirmasi = confirm(`Apakah Anda yakin ingin memilih pasangan calon ${paslonName}? Pilihan Anda tidak dapat diubah setelah dikirim.`);
                if (!konfirmasi) return;

                setActionLoading(true);
                try {
                    // 1. Catat Suara Masuk
                    const voteId = `vote-${Date.now()}-${currentVoter.username}`;
                    await db.collection(`artifacts/${appId}/public/data/votes`).doc(voteId).set({
                        id: voteId,
                        candidateId: candidateId,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });

                    // 2. Tandai Pemilih bahwa sudah menggunakan hak suara
                    await db.collection(`artifacts/${appId}/public/data/voters`).doc(currentVoter.id).update({
                        hasVoted: true,
                        votedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });

                    showAlert("Suara Terkirim!", "Terima kasih atas partisipasi Anda dalam PILKETOS SMK Negeri 1 Cermee. Suara Anda sangat berharga!", "success");
                    
                    // Otomatis logout setelah berhasil memilih
                    setTimeout(() => {
                        handleLogout();
                    }, 3000);

                } catch (err) {
                    console.error("Voting error: ", err);
                    showAlert("Gagal", "Terjadi gangguan koneksi, silakan coba beberapa saat lagi.", "danger");
                } finally {
                    setActionLoading(false);
                }
            };

            // Fungsi Impor File Excel Pemilih
            const handleExcelUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = async (evt) => {
                    try {
                        const data = evt.target.result;
                        const workbook = XLSX.read(data, { type: 'binary' });
                        const sheetName = workbook.SheetNames[0];
                        const sheet = workbook.Sheets[sheetName];
                        const rows = XLSX.utils.sheet_to_json(sheet);

                        if (rows.length === 0) {
                            showAlert("File Kosong", "Tidak ditemukan baris data di dalam lembar Excel tersebut.", "warning");
                            return;
                        }

                        setActionLoading(true);
                        
                        const batch = db.batch();
                        let importCount = 0;

                        rows.forEach((row) => {
                            const usernameRaw = row["No Urut"] || row["Username"] || row["NISN"] || row["no_urut"] || Object.values(row)[0];
                            const nama = row["Nama"] || row["Nama Pemilih"] || row["nama"] || Object.values(row)[1] || `Pemilih ${usernameRaw}`;

                            if (usernameRaw) {
                                let username = String(usernameRaw).trim();
                                if (username.length < 4) {
                                    username = username.padStart(4, '0');
                                } else if (username.length > 4) {
                                    username = username.slice(-4);
                                }

                                const generatedPassword = Math.random().toString(36).substring(2, 8).toUpperCase();
                                
                                const voterId = `voter-${username}`;
                                const voterDocRef = db.collection(`artifacts/${appId}/public/data/voters`).doc(voterId);
                                
                                batch.set(voterDocRef, {
                                    id: voterId,
                                    username: username,
                                    nama: String(nama).trim(),
                                    password: generatedPassword,
                                    hasVoted: false
                                });
                                importCount++;
                            }
                        });

                        await batch.commit();
                        showAlert("Unggah Berhasil", `Berhasil mengunggah dan memproses ${importCount} data pemilih baru!`, "success");
                    } catch (error) {
                        console.error("Excel error: ", error);
                        showAlert("Format Salah", "Gagal mengolah file excel. Pastikan struktur tabel memiliki kolom 'No Urut' dan 'Nama'.", "danger");
                    } finally {
                        setActionLoading(false);
                        e.target.value = null; // reset input
                    }
                };
                reader.readAsBinaryString(file);
            };

            // Mengunduh Template File Excel Pemilih
            const downloadExcelTemplate = () => {
                const sampleData = [
                    { "No Urut": "0001", "Nama": "Ahmad Dani" },
                    { "No Urut": "0002", "Nama": "Dewi Sartika" },
                    { "No Urut": "0003", "Nama": "Rian Hidayat" },
                    { "No Urut": "0004", "Nama": "Zaskia Nur" }
                ];
                
                const worksheet = XLSX.utils.json_to_sheet(sampleData);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "Data Pemilih");
                XLSX.writeFile(workbook, "Template_Data_Pemilih_Pilketos.xlsx");
            };

            // Update Pengaturan Aplikasi
            const handleSaveSettings = async (e) => {
                e.preventDefault();
                setActionLoading(true);
                try {
                    const updated = { 
                        ...settings, 
                        tahunPelajaran: tempTahunPelajaran, 
                        schoolLogo: tempSchoolLogo, 
                        adminPassword: tempAdminPassword 
                    };
                    await db.doc(`artifacts/${appId}/public/data/settings/config`).set(updated);
                    showAlert("Tersimpan", "Pengaturan berhasil diperbarui dan disimpan.", "success");
                } catch (err) {
                    showAlert("Gagal", "Gagal menyimpan perubahan pengaturan.", "danger");
                } finally {
                    setActionLoading(false);
                }
            };

            // Reset Seluruh Suara Masuk (Clear Votes)
            const handleResetVotes = async () => {
                const konfirmasi = confirm("PERINGATAN! Tindakan ini akan menghapus semua suara yang telah masuk secara permanen. Apakah Anda yakin?");
                if (!konfirmasi) return;

                setActionLoading(true);
                try {
                    const voteSnap = await db.collection(`artifacts/${appId}/public/data/votes`).get();
                    const batch = db.batch();
                    voteSnap.forEach(doc => {
                        batch.delete(doc.ref);
                    });

                    const voterSnap = await db.collection(`artifacts/${appId}/public/data/voters`).get();
                    voterSnap.forEach(doc => {
                        batch.update(doc.ref, { hasVoted: false, votedAt: null });
                    });

                    await batch.commit();
                    showAlert("Reset Berhasil", "Seluruh suara masuk telah dihapus dan hak suara pemilih telah dipulihkan.", "info");
                } catch (err) {
                    showAlert("Gagal", "Tidak dapat melakukan reset suara.", "danger");
                } finally {
                    setActionLoading(false);
                }
            };

            // Menghapus Seluruh Data Pemilih
            const handleClearAllVoters = async () => {
                const konfirmasi = confirm("Apakah Anda yakin ingin menghapus SELURUH daftar pemilih?");
                if (!konfirmasi) return;

                setActionLoading(true);
                try {
                    const voterSnap = await db.collection(`artifacts/${appId}/public/data/voters`).get();
                    const batch = db.batch();
                    voterSnap.forEach(doc => {
                        batch.delete(doc.ref);
                    });
                    await batch.commit();
                    showAlert("Data Terhapus", "Seluruh data pemilih telah dibersihkan.", "info");
                } catch (err) {
                    showAlert("Gagal", "Gagal menghapus data pemilih.", "danger");
                } finally {
                    setActionLoading(false);
                }
            };

            const triggerPrint = () => {
                window.print();
            };

            // Filter data pemilih untuk ditampilkan di tabel
            const filteredVoters = voters.filter(v => {

                                                            </div>
                                                            <div class="col-span-2">
                                                                <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Foto URL (Online)</label>
                                                                <input 
                                                                    type="url" 
                                                                    value={editingPaslon.foto}
                                                                    onChange={(e) => setEditingPaslon({ ...editingPaslon, foto: e.target.value })}
                                                                    class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                                                                />
                                                            </div>
                                                        </div>

                                                        <div>
                                                            <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Nama Calon Ketua OSIS</label>
                                                            <input 
                                                                type="text" 
                                                                value={editingPaslon.namaKetua}
                                                                onChange={(e) => setEditingPaslon({ ...editingPaslon, namaKetua: e.target.value })}
                                                                class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                                                            />
                                                        </div>

                                                        <div>
                                                            <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Nama Calon Wakil Ketua OSIS</label>
                                                            <input 
                                                                type="text" 
                                                                value={editingPaslon.namaWakil}
                                                                onChange={(e) => setEditingPaslon({ ...editingPaslon, namaWakil: e.target.value })}
                                                                class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                                                            />
                                                        </div>

                                                        <div>
                                                            <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Visi</label>
                                                            <textarea 
                                                                rows="2" 
                                                                value={editingPaslon.visi}
                                                                onChange={(e) => setEditingPaslon({ ...editingPaslon, visi: e.target.value })}
                                                                class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                                                            ></textarea>
                                                        </div>

                                                        <div>
                                                            <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Misi</label>
                                                            <textarea 
                                                                rows="4" 
                                                                value={editingPaslon.misi}
                                                                onChange={(e) => setEditingPaslon({ ...editingPaslon, misi: e.target.value })}
                                                                class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-700"
                                                            ></textarea>
                                                        </div>

                                                        <div class="flex gap-3 pt-4 border-t border-slate-100">
                                                            <button 
                                                                type="button" 
                                                                onClick={() => setEditingPaslon(null)}
                                                                class="flex-1 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl text-sm transition"
                                                            >
                                                                Batal
                                                            </button>
                                                            <button 
                                                                type="submit" 
                                                                class="flex-1 py-3 bg-slate-900 hover:bg-slate-800 text-white font-bold rounded-xl text-sm transition"
                                                            >
                                                                Simpan Perubahan
                                                            </button>
                                                        </div>
                                                    </form>
                                                </div>
                                            </div>
                                        )}

                                    </div>
                                )}

                                {/* ========================== TAB 4: PENGATURAN APLIKASI ========================== */}
                                {activeTab === 'pengaturan' && (
                                    <div class="space-y-6">
                                        <div>
                                            <h2 class="text-2xl font-black text-slate-900">Konfigurasi Pengaturan Aplikasi</h2>
                                            <p class="text-sm text-slate-500">Kelola identitas tahun pelajaran, tautan logo sekolah, dan kata sandi admin secara terpusat.</p>
                                        </div>

                                        <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden p-6 md:p-8 max-w-2xl">
                                            <form onSubmit={handleSaveSettings} class="space-y-5">
                                                <div>
                                                    <label class="block text-xs font-bold text-slate-700 uppercase mb-1.5">Tahun Pelajaran OSIS</label>
                                                    <input 
                                                        type="text" 
                                                        value={tempTahunPelajaran}
                                                        onChange={(e) => setTempTahunPelajaran(e.target.value)}
                                                        placeholder="Contoh: 2026/2027"
                                                        class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                                                    />
                                                </div>

                                                <div>
                                                    <label class="block text-xs font-bold text-slate-700 uppercase mb-1.5">Logo Sekolah URL (Foto Online)</label>
                                                    <input 
                                                        type="url" 
                                                        value={tempSchoolLogo}
                                                        onChange={(e) => setTempSchoolLogo(e.target.value)}
                                                        placeholder="https://domain-sekolah.com/logo.png"
                                                        class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                                                    />
                                                </div>

                                                <div>
                                                    <label class="block text-xs font-bold text-slate-700 uppercase mb-1.5">Kata Sandi Administrator Baru</label>
                                                    <input 
                                                        type="text" 
                                                        value={tempAdminPassword}
                                                        onChange={(e) => setTempAdminPassword(e.target.value)}
                                                        placeholder="Sandi Rahasia"
                                                        class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono"
                                                    />
                                                </div>

                                                <button 
                                                    type="submit" 
                                                    class="w-full py-3.5 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl text-sm transition"
                                                >
                                                    Simpan Konfigurasi
                                                </button>
                                            </form>
                                        </div>
                                    </div>
                                )}

                            </div>
                        )}

                    </main>

                    {/* FOOTER */}
                    <footer class="bg-white border-t border-slate-200 py-6 text-center text-slate-500 text-xs no-print">
                        <div class="max-w-7xl mx-auto px-6 flex flex-col sm:flex-row items-center justify-between gap-4">
                            <p class="font-medium">© {new Date().getFullYear()} SMK Negeri 1 Cermee. Hak Cipta Dilindungi.</p>
                            <div class="flex space-x-4">
                                <a href="#" class="hover:text-blue-600 font-semibold transition">Bantuan</a>
                                <a href="#" class="hover:text-blue-600 font-semibold transition">Kebijakan Privasi</a>
                            </div>
                        </div>
                    </footer>

                </div>
            );
        }

        // Render aplikasi utama ke elemen root
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

</body>
</html>
